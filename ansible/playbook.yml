---
- name: Configure Minecraft server on EC2
  hosts: all
  become: true
  vars:
    aws_region: us-east-1
    minecraft_data_dir: /opt/minecraft/data
    container_name: minecraft
    ecr_registry: "{{ ecr_image_uri | regex_replace('/[^/]+:[^/]+$', '') }}"

  tasks:
    # ── Prerequisites ────────────────────────────────────────────────────────────

    - name: Install Docker and AWS CLI
      ansible.builtin.dnf:
        name:
          - docker
          - awscli
        state: present

    - name: Install Python docker SDK (required for docker_container module)
      ansible.builtin.pip:
        name: docker
        state: present

    - name: Enable and start Docker daemon
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      ansible.builtin.user:
        name: ec2-user
        groups: docker
        append: true

    # ── Data directory and world restore ─────────────────────────────────────────

    - name: Create Minecraft data directory
      ansible.builtin.file:
        path: "{{ minecraft_data_dir }}"
        state: directory
        mode: "0755"

    - name: Check if world data is already present
      ansible.builtin.stat:
        path: "{{ minecraft_data_dir }}/world"
      register: world_dir

    - name: Restore world data from S3 (skipped if world already present)
      ansible.builtin.shell: |
        set -e
        if aws s3 ls "s3://{{ s3_backup_bucket }}/minecraft/world-backup.tar.gz" \
            --region {{ aws_region }} > /dev/null 2>&1; then
          aws s3 cp "s3://{{ s3_backup_bucket }}/minecraft/world-backup.tar.gz" \
            /tmp/world-backup.tar.gz --region {{ aws_region }}
          tar -xzf /tmp/world-backup.tar.gz -C {{ minecraft_data_dir }}
          rm -f /tmp/world-backup.tar.gz
          echo "RESTORED"
        else
          echo "NO_BACKUP_FOUND"
        fi
      register: restore_result
      changed_when: "'RESTORED' in restore_result.stdout"
      when: not world_dir.stat.exists

    # ── ECR authentication and image pull ────────────────────────────────────────

    - name: Authenticate Docker to ECR using instance profile credentials
      ansible.builtin.shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
          docker login --username AWS --password-stdin {{ ecr_registry }}
      changed_when: false

    - name: Pull pinned Minecraft image from ECR
      community.docker.docker_image:
        name: "{{ ecr_image_uri }}"
        source: pull
        force_source: true

    # ── Container lifecycle ──────────────────────────────────────────────────────

    - name: Start Minecraft container (idempotent — recreates only if config changed)
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ ecr_image_uri }}"
        state: started
        restart_policy: unless-stopped
        published_ports:
          - "25565:25565"
        volumes:
          - "{{ minecraft_data_dir }}:/data"
        env:
          EULA: "TRUE"
          MOTD: "Minecraft Server | {{ student_id }}"
          MEMORY: "2G"
          JVM_OPTS: "-Xmx2G -Xms1G"

    # ── Smoke check ──────────────────────────────────────────────────────────────

    - name: Wait for Minecraft server to finish loading
      ansible.builtin.shell: |
        for i in $(seq 1 12); do
          sleep 10
          if docker logs {{ container_name }} 2>&1 | grep -q "Done"; then
            echo "SERVER_READY"
            exit 0
          fi
        done
        echo "TIMEOUT"
        exit 1
      register: startup_check
      changed_when: false
      failed_when: "'TIMEOUT' in startup_check.stdout"
