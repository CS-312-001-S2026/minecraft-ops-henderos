---
- name: Configure Minecraft server on EC2
  hosts: all
  become: true
  vars:
    aws_region: us-east-1
    minecraft_data_dir: /opt/minecraft/data
    container_name: minecraft
    ecr_registry: "{{ ecr_image_uri | regex_replace('/[^/]+:[^/]+$', '') }}"

  tasks:
    # ── Prerequisites ────────────────────────────────────────────────────────────

    - name: Install Docker and unzip
      ansible.builtin.dnf:
        name:
          - docker
          - unzip
        state: present

    - name: Install AWS CLI v2 (official installer, self-contained)
      ansible.builtin.shell: |
        if aws --version 2>/dev/null | grep -q "aws-cli/2"; then
          echo "ALREADY_INSTALLED"
        else
          curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp/
          /tmp/aws/install
          rm -rf /tmp/aws /tmp/awscliv2.zip
          echo "INSTALLED"
        fi
      register: awscli_install
      changed_when: "'INSTALLED' in awscli_install.stdout"

    - name: Enable and start Docker daemon
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      ansible.builtin.user:
        name: ec2-user
        groups: docker
        append: true

    # ── Data directory and world restore ─────────────────────────────────────────

    - name: Create Minecraft data directory
      ansible.builtin.file:
        path: "{{ minecraft_data_dir }}"
        state: directory
        mode: "0755"

    - name: Check if world data is already present
      ansible.builtin.stat:
        path: "{{ minecraft_data_dir }}/world"
      register: world_dir

    - name: Restore world data from S3 (skipped if world already present)
      ansible.builtin.shell: |
        set -e
        if aws s3 ls "s3://{{ s3_backup_bucket }}/minecraft/world-backup.tar.gz" \
            --region {{ aws_region }} > /dev/null 2>&1; then
          aws s3 cp "s3://{{ s3_backup_bucket }}/minecraft/world-backup.tar.gz" \
            /tmp/world-backup.tar.gz --region {{ aws_region }}
          tar -xzf /tmp/world-backup.tar.gz -C {{ minecraft_data_dir }}
          rm -f /tmp/world-backup.tar.gz
          echo "RESTORED"
        else
          echo "NO_BACKUP_FOUND"
        fi
      register: restore_result
      changed_when: "'RESTORED' in restore_result.stdout"
      when: not world_dir.stat.exists

    # ── ECR authentication and image pull ────────────────────────────────────────

    - name: Authenticate Docker to ECR using instance profile credentials
      ansible.builtin.shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
          docker login --username AWS --password-stdin {{ ecr_registry }}
      changed_when: false

    - name: Pull pinned Minecraft image from ECR
      ansible.builtin.command:
        cmd: docker pull {{ ecr_image_uri }}
      register: pull_result
      changed_when: "'Status: Downloaded newer image' in pull_result.stdout or 'newer' in pull_result.stdout"

    # ── Container lifecycle ──────────────────────────────────────────────────────

    - name: Check if Minecraft container exists
      ansible.builtin.shell: |
        docker inspect --format='{{ "{{" }}.State.Running{{ "}}" }}' {{ container_name }} 2>/dev/null || echo "MISSING"
      register: container_state
      changed_when: false

    - name: Stop existing container if running
      ansible.builtin.command: docker stop {{ container_name }}
      when: container_state.stdout | trim == "true"
      changed_when: true

    - name: Remove existing container if present
      ansible.builtin.command: docker rm {{ container_name }}
      when: container_state.stdout | trim != "MISSING"
      changed_when: true
      failed_when: false

    - name: Start Minecraft container
      ansible.builtin.command: >
        docker run -d
        --name {{ container_name }}
        --restart unless-stopped
        -p 25565:25565
        -v {{ minecraft_data_dir }}:/data
        -e EULA=TRUE
        -e "MOTD=Minecraft Server | {{ student_id }}"
        -e MEMORY=2G
        {{ ecr_image_uri }}

    # ── Smoke check ──────────────────────────────────────────────────────────────

    - name: Wait for Minecraft server to finish loading
      ansible.builtin.shell: |
        for i in $(seq 1 12); do
          sleep 10
          if docker logs {{ container_name }} 2>&1 | grep -q "Done"; then
            echo "SERVER_READY"
            exit 0
          fi
        done
        echo "TIMEOUT"
        exit 1
      register: startup_check
      changed_when: false
      failed_when: "'TIMEOUT' in startup_check.stdout"
